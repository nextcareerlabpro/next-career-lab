<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#047857"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#064e3b"/>
      <stop offset="50%" style="stop-color:#065f46"/>
      <stop offset="100%" style="stop-color:#047857"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#059669" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- VARIANT 1 — Primary Horizontal Logo (transparent)  -->
  <!-- ═══════════════════════════════════════════════════ -->

  <!-- Badge icon -->
  <rect x="60" y="60" width="120" height="120" rx="28" ry="28" fill="url(#badgeGrad)" filter="url(#shadow)"/>
  <!-- UR text in badge -->
  <text x="120" y="141" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-2">UR</text>

  <!-- Wordmark -->
  <text font-family="Arial, Helvetica, sans-serif" font-size="62" font-weight="800" y="118">
    <tspan x="210" fill="#059669">Upgrade </tspan><tspan fill="#111827">Your </tspan><tspan fill="#f97316">Resume</tspan>
  </text>
  <!-- Subtitle -->
  <text x="212" y="163" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="500" fill="#9ca3af" letter-spacing="2">AI POWERED CAREER SUITE</text>

  <!-- Divider -->
  <line x1="60" y1="220" x2="1140" y2="220" stroke="#e5e7eb" stroke-width="1.5"/>


  <!-- ═══════════════════════════════════════════════════ -->
  <!-- VARIANT 2 — Dark Background Version                -->
  <!-- ═══════════════════════════════════════════════════ -->

  <rect x="60" y="260" width="1080" height="230" rx="20" ry="20" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Dot pattern -->
  <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="15" cy="15" r="1.2" fill="white" opacity="0.08"/>
  </pattern>
  <rect x="60" y="260" width="1080" height="230" rx="20" ry="20" fill="url(#dots)"/>

  <!-- Badge on dark bg -->
  <rect x="96" y="296" width="104" height="104" rx="20" ry="20" fill="rgba(255,255,255,0.15)"/>
  <rect x="96" y="296" width="104" height="104" rx="20" ry="20" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <text x="148" y="362" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-1.5">UR</text>

  <!-- Wordmark on dark bg -->
  <text font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="800" y="350">
    <tspan x="228" fill="#34d399">Upgrade </tspan><tspan fill="white">Your </tspan><tspan fill="#fb923c">Resume</tspan>
  </text>
  <text x="230" y="390" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="500" fill="rgba(167,243,208,0.85)" letter-spacing="2.5">AI POWERED CAREER SUITE</text>

  <!-- Domain tag -->
  <text x="1104" y="476" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="500" fill="rgba(167,243,208,0.6)" text-anchor="end">upgradeyourresume.com</text>


  <!-- ═══════════════════════════════════════════════════ -->
  <!-- VARIANT 3 — Icon Only (large, for stamps/avatars)  -->
  <!-- ═══════════════════════════════════════════════════ -->

  <!-- Icon badge large -->
  <rect x="60" y="530" width="160" height="160" rx="36" ry="36" fill="url(#badgeGrad)" filter="url(#shadow)"/>
  <text x="140" y="629" font-family="Arial, Helvetica, sans-serif" font-size="68" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-3">UR</text>

  <!-- Icon label -->
  <text x="140" y="715" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" fill="#6b7280" text-anchor="middle">ICON ONLY</text>


  <!-- ═══════════════════════════════════════════════════ -->
  <!-- VARIANT 4 — Stacked / Centered (for social media)  -->
  <!-- ═══════════════════════════════════════════════════ -->

  <!-- Stacked badge -->
  <rect x="480" y="530" width="130" height="130" rx="28" ry="28" fill="url(#badgeGrad)" filter="url(#shadow)"/>
  <text x="545" y="615" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-2">UR</text>

  <!-- Stacked wordmark -->
  <text text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="800" y="705">
    <tspan x="545" fill="#059669">Upgrade </tspan><tspan fill="#111827">Your </tspan><tspan fill="#f97316">Resume</tspan>
  </text>
  <text x="545" y="740" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="500" fill="#9ca3af" text-anchor="middle" letter-spacing="1.5">AI POWERED CAREER SUITE</text>

  <!-- Stacked label -->
  <text x="545" y="775" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#d1d5db" text-anchor="middle">STACKED</text>


  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Labels -->
  <!-- ═══════════════════════════════════════════════════ -->
  <text x="60" y="252" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#d1d5db" letter-spacing="1">VARIANT 1 — LIGHT BACKGROUND</text>
  <text x="60" y="256" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#d1d5db" letter-spacing="1" y="508">VARIANT 2 — DARK BACKGROUND</text>
</svg>
